<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZippyType | Legacy Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #6366f1;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { margin-top: 0; font-weight: 900; text-transform: uppercase; letter-spacing: -0.05em; }
        .hidden { display: none !important; }
        
        /* Auth Section */
        #auth-section { text-align: center; max-width: 400px; margin: 0 auto; }
        .auth-form { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .auth-input {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }
        .auth-input:focus { border-color: var(--accent); }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        
        /* Game Section */
        #game-section { width: 100%; }
        #text-display {
            font-size: 24px;
            line-height: 1.5;
            margin-bottom: 20px;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .char { color: var(--text-muted); }
        .char.correct { color: #10b981; }
        .char.incorrect { color: #f43f5e; background: rgba(244, 63, 94, 0.2); }
        .char.current { border-bottom: 2px solid var(--accent); }
        
        #input-field {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px;
            font-size: 18px;
            border-radius: 12px;
            outline: none;
            font-family: monospace;
        }
        #input-field:focus { border-color: var(--accent); }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            font-weight: 700;
            font-size: 18px;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 12px;
        }
        
        .nav {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            align-items: center;
        }
        .user-info { font-size: 14px; color: var(--text-muted); }
        .logout-btn { background: transparent; color: #f43f5e; padding: 5px 10px; font-size: 12px; border: 1px solid #f43f5e; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo" style="font-weight: 900; color: var(--accent);">ZIPPYTYPE <span style="font-size: 10px; opacity: 0.5;">LEGACY</span></div>
        <div id="user-nav" class="hidden">
            <span id="user-email" class="user-info"></span>
            <button onclick="signOut()" class="logout-btn">LOGOUT</button>
        </div>
    </div>

    <div class="container">
        <!-- Login Section -->
        <div id="auth-section">
            <h1>Login Required</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Legacy mode requires an account to practice.</p>
            
            <div class="auth-form">
                <input type="text" id="login-email" class="auth-input" placeholder="Email or Username">
                <input type="password" id="login-password" class="auth-input" placeholder="Password">
                <button onclick="signIn()">SIGN IN</button>
            </div>
            
            <p style="font-size: 12px; color: var(--text-muted); margin-top: 20px;">Use your ZippyType credentials to log in.</p>
        </div>

        <!-- Game Section -->
        <div id="game-section" class="hidden">
            <div id="text-display"></div>
            <input type="text" id="input-field" placeholder="Type the text above..." autocomplete="off">
            
            <div class="stats">
                <div class="stat-box">WPM: <span id="wpm">0</span></div>
                <div class="stat-box">ACC: <span id="acc">100</span>%</div>
                <div class="stat-box">TIME: <span id="timer">0</span>s</div>
            </div>
            
            <button onclick="resetGame()" style="margin-top: 20px; background: rgba(255,255,255,0.1); color: white;">RESET TEST</button>
        </div>
    </div>

    <script>
        // Configuration
        const SUPABASE_URL = "https://ewdrrhdsxjrhxyzgjokg.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_VOd9I9_yUqlHFPBfkoCtfA_FtttMyKc";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Game State
        let targetText = "The quick brown fox jumps over the lazy dog. Speed typing is a skill that improves with consistent practice and focus.";
        let currentIndex = 0;
        let startTime = null;
        let timerInterval = null;
        let mistakes = 0;

        const textDisplay = document.getElementById('text-display');
        const inputField = document.getElementById('input-field');
        const wpmDisplay = document.getElementById('wpm');
        const accDisplay = document.getElementById('acc');
        const timerDisplay = document.getElementById('timer');

        function renderText() {
            textDisplay.innerHTML = '';
            targetText.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.textContent = char;
                span.className = 'char';
                if (i < currentIndex) span.classList.add('correct');
                if (i === currentIndex) span.classList.add('current');
                textDisplay.appendChild(span);
            });
        }

        inputField.addEventListener('input', (e) => {
            if (!startTime) {
                startTime = Date.now();
                startTimer();
            }

            const val = e.target.value;
            const lastChar = val[val.length - 1];
            
            if (lastChar === targetText[currentIndex]) {
                currentIndex++;
                if (currentIndex === targetText.length) {
                    finishGame();
                }
            } else {
                mistakes++;
                // Visual feedback for mistake
                const chars = textDisplay.querySelectorAll('.char');
                chars[currentIndex].classList.add('incorrect');
                setTimeout(() => chars[currentIndex].classList.remove('incorrect'), 200);
            }
            
            e.target.value = ''; // Clear input for next char
            renderText();
            updateStats();
        });

        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                timerDisplay.textContent = elapsed;
                updateStats();
            }, 1000);
        }

        function updateStats() {
            if (!startTime) return;
            const elapsedMinutes = (Date.now() - startTime) / 60000;
            const words = currentIndex / 5;
            const wpm = Math.round(words / elapsedMinutes) || 0;
            const accuracy = Math.round(((currentIndex - mistakes) / Math.max(1, currentIndex)) * 100);
            
            wpmDisplay.textContent = wpm;
            accDisplay.textContent = Math.max(0, accuracy);
        }

        function finishGame() {
            clearInterval(timerInterval);
            inputField.disabled = true;
            alert(`Test Complete!\nWPM: ${wpmDisplay.textContent}\nAccuracy: ${accDisplay.textContent}%`);
        }

        function resetGame() {
            currentIndex = 0;
            startTime = null;
            mistakes = 0;
            clearInterval(timerInterval);
            timerDisplay.textContent = '0';
            wpmDisplay.textContent = '0';
            accDisplay.textContent = '100';
            inputField.value = '';
            inputField.disabled = false;
            renderText();
        }

        // Auth Logic
        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('game-section').classList.remove('hidden');
                document.getElementById('user-nav').classList.remove('hidden');
                document.getElementById('user-email').textContent = user.email;
                resetGame();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('game-section').classList.add('hidden');
                document.getElementById('user-nav').classList.add('hidden');
            }
        }

        async function signIn() {
            const emailOrUsername = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            if (!emailOrUsername || !password) {
                alert("Please enter both email/username and password.");
                return;
            }

            let loginEmail = emailOrUsername;
            
            // If it's a username, we need to resolve it to an email
            // (Mirroring the logic in Auth.tsx)
            if (!emailOrUsername.includes('@')) {
                const { data: resolvedEmail, error: resolveErr } = await supabaseClient.rpc('get_email_by_username', { 
                    username_arg: emailOrUsername.toLowerCase() 
                });
                
                if (resolveErr || !resolvedEmail) {
                    alert("Could not find user with that username.");
                    return;
                }
                loginEmail = resolvedEmail;
            }

            const { error } = await supabaseClient.auth.signInWithPassword({
                email: loginEmail,
                password: password
            });

            if (error) {
                alert(error.message);
            } else {
                checkUser();
            }
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        // Initialize
        window.onload = async () => {
            checkUser();
        };
    </script>
</body>
</html>
